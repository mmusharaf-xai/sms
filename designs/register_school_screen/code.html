<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register Your School - School Management</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        'school-navy': '#1e293b',
                        'school-blue': '#334155',
                        'school-accent': '#2563eb',
                        'background-light': '#f8fafc',
                        'background-dark': '#0f172a',
                    },
                    fontFamily: {
                        "display": ["Inter", "system-ui", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body {
            font-family: 'Public Sans', sans-serif;
            min-height: 100dvh;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .filled-icon {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<div class="flex items-center bg-white dark:bg-slate-900 border-b border-slate-100 dark:border-slate-800 px-4 py-4 sticky top-0 z-10">
<button class="flex items-center justify-center p-1 text-slate-500 hover:text-school-navy dark:text-slate-400 dark:hover:text-white transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-lg font-bold leading-tight flex-1 text-center text-school-navy dark:text-white mr-8">Register Your School</h1>
</div>
<div class="flex-1 px-4 py-6">
<form action="#" class="flex flex-col gap-6 max-w-md mx-auto">
<div class="flex flex-col items-center gap-4">
<div class="relative group">
<div class="w-24 h-24 rounded-2xl bg-slate-100 dark:bg-slate-800 border-2 border-dashed border-slate-300 dark:border-slate-700 flex flex-col items-center justify-center text-slate-400 overflow-hidden">
<span class="material-symbols-outlined text-3xl">add_a_photo</span>
</div>
<input accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" type="file"/>
</div>
<div class="text-center">
<p class="text-sm font-semibold text-school-navy dark:text-white">Upload School Logo</p>
<p class="text-xs text-slate-500 dark:text-slate-400">PNG or JPG up to 2MB</p>
</div>
</div>
<div class="space-y-4">
<div class="space-y-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1" for="school-name">School Name</label>
<input class="w-full h-12 px-4 rounded-xl bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 focus:ring-2 focus:ring-school-accent focus:border-transparent transition-all" id="school-name" name="school-name" placeholder="e.g. Greenwood Academy" type="text"/>
</div>
<div class="space-y-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1" for="address">Address</label>
<textarea class="w-full p-4 rounded-xl bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 focus:ring-2 focus:ring-school-accent focus:border-transparent transition-all" id="address" name="address" placeholder="Street name, City, State, Zip" rows="2"></textarea>
</div>
<div class="space-y-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1" for="owner-name">Owner Name</label>
<input class="w-full h-12 px-4 rounded-xl bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 focus:ring-2 focus:ring-school-accent focus:border-transparent transition-all" id="owner-name" name="owner-name" placeholder="Full name of the administrator" type="text"/>
</div>
<div class="space-y-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1" for="phone">Phone Number</label>
<input class="w-full h-12 px-4 rounded-xl bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 focus:ring-2 focus:ring-school-accent focus:border-transparent transition-all" id="phone" name="phone" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
<div class="space-y-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1" for="email">Email Address</label>
<input class="w-full h-12 px-4 rounded-xl bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 focus:ring-2 focus:ring-school-accent focus:border-transparent transition-all" id="email" name="email" placeholder="school@example.com" type="email"/>
</div>
</div>
<div class="pt-4 pb-8">
<button class="w-full h-14 bg-school-navy dark:bg-white text-white dark:text-school-navy font-bold rounded-xl shadow-lg hover:opacity-90 active:scale-[0.98] transition-all duration-200" type="submit">
                        Submit Registration
                    </button>
<p class="text-center text-xs text-slate-500 dark:text-slate-400 mt-4">
                        By clicking submit, you agree to our Terms of Service.
                    </p>
</div>
</form>
</div>
</div>

</body></html>
