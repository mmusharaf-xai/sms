<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>School Management App - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'school-navy': '#1e293b', // Navy blue for a professional look
                        'school-blue': '#334155',
                        'school-accent': '#2563eb'
                    }
                }
            }
        }
    </script>
<style data-purpose="custom-layout">body {
            -webkit-tap-highlight-color: transparent;
            background-color: #f8fafc;
        }
        .ios-blur {
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex items-center justify-center min-h-screen">
<main class="w-full max-w-md px-6 py-8" data-purpose="login-form-container">
<header class="mb-10 text-center">
<div class="inline-flex items-center justify-center w-16 h-16 mb-4 rounded-2xl bg-school-navy text-white shadow-lg" data-purpose="app-logo">
<svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 14l9-5-9-5-9 5 9 5z"></path>
<path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"></path>
<path d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<h1 class="text-3xl font-bold text-school-navy">Welcome Back</h1>
<p class="mt-2 text-slate-500">Login to manage your school activities</p>
</header>
<section>
<form action="#" class="space-y-5" method="POST">
<div data-purpose="input-group">
<label class="block text-sm font-semibold text-school-navy mb-1.5 ml-1" for="email">Email Address</label>
<input class="block w-full px-4 py-3.5 rounded-xl border-slate-200 bg-white shadow-sm focus:border-school-accent focus:ring-school-accent text-base" id="email" name="email" placeholder="john@example.com" required="" type="email"/>
</div>
<div data-purpose="input-group">
<div class="flex items-center justify-between mb-1.5 ml-1">
<label class="block text-sm font-semibold text-school-navy" for="password">Password</label>
<a class="text-xs font-semibold text-school-accent hover:underline" href="#">Forgot?</a>
</div>
<input class="block w-full px-4 py-3.5 rounded-xl border-slate-200 bg-white shadow-sm focus:border-school-accent focus:ring-school-accent text-base" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<div class="pt-4" data-purpose="submit-action">
<button class="w-full py-4 px-6 bg-school-navy hover:bg-black text-white font-bold rounded-xl shadow-lg transition-all duration-200 text-lg active:scale-[0.98]" type="submit">
                    Login
                </button>
</div>
</form>
</section>
<footer class="mt-8 text-center" data-purpose="signup-link-container">
<p class="text-slate-600">
            Don't have an account? 
            <a class="font-bold text-school-navy hover:text-school-accent transition-colors underline-offset-4 hover:underline" href="#">
                Sign Up
            </a>
</p>
</footer>
</main>

</body></html>
